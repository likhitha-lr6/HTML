//Thead, tbody and tfoot
<!DOCTYPE html>
<html>
<head>
    <title>Marks Table</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Math</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>90</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>Total</td>
                <td>175</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
